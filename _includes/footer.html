<footer class="site-footer h-card" style="border-top: 1px solid #e8e8e8; padding: 30px 0;">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">

      <div style="flex: 1; min-width: 250px; margin-bottom: 20px;">
        <h2 class="footer-heading" style="margin-bottom: 5px; font-size: 18px;">{{ site.title | escape }}</h2>
        <p style="color: #828282; font-size: 14px; margin-top: 0; margin-bottom: 10px; line-height: 1.6;">
          {{- site.description | escape -}}
        </p>
      </div>

      <div style="flex: 1; min-width: 250px; margin-bottom: 20px;">
        <!-- <div style="font-size: 14px; margin-bottom: 5px;">
          <a href="mailto:kanasimy@snu.ac.kr" style="font-weight: bold;">Email</a>
        </div> -->
        <div style="color: #828282; font-size: 14px; line-height: 1.6;">
          <!-- &copy; {{ site.time | date: "%Y" }} {{ site.author | escape }} <br> -->
          Powered by Jekyll & Minima
        </div>
      </div>

    </div>
  </div>
</footer>
